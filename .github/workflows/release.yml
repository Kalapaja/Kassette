name: Release Payment Page

on:
  release:
    types: [created]

permissions:
  contents: write

env:
  DOCKER_HOST: ${{ vars.DAGGER_CI_HOST }}

jobs:
  release-zip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-dagger
        with:
          ssh-private-key: ${{ secrets.DAGGER_CI_SSH_KEY }}
          known-host: ${{ vars.DAGGER_CI_KNOWN_HOST }}

      - name: Build release zip
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          dagger call release-zip --version="$VERSION" \
            export --path="./payment-page-v${VERSION}.zip"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            "payment-page-v${GITHUB_REF_NAME#v}.zip" \
            --clobber
