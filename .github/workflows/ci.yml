name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  DOCKER_HOST: ${{ vars.DAGGER_CI_HOST }}
  # _EXPERIMENTAL_DAGGER_RUNNER_HOST is set by setup-dagger from .tool-versions

jobs:
  checks:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: Lint, command: lint }
          - { name: Format, command: format-check }
          - { name: Typecheck, command: typecheck }
          - { name: Test, command: test }
          - { name: 'Audit (advisory)', command: audit }
          - { name: Build, command: build }
          - { name: E2E, command: end-to-end }
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-dagger
        with:
          ssh-private-key: ${{ secrets.DAGGER_CI_SSH_KEY }}
          known-host: ${{ vars.DAGGER_CI_KNOWN_HOST }}
      - run: dagger call ${{ matrix.command }}
